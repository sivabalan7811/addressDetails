<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel STM Palace</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:380px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    padding:20px;
    text-align:center;
}

.hotel-image{
    width:100%;
    height:auto;
    max-height:220px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:18px;
}

h1{
    font-size:28px;
    margin-bottom:15px;
}

p{
    margin-bottom:15px;
    line-height:1.6;
    color:#444;
    word-wrap:break-word;
}

a{
    color:#007BFF;
    text-decoration:none;
    font-weight:bold;
}

.button{
    display:block;
    width:100%;
    background:#007BFF;
    color:#fff;
    padding:14px;
    border-radius:8px;
    margin-top:20px;
    text-decoration:none;
    font-size:16px;
}

.button:hover{
    background:#0056b3;
}

/* Mobile */
@media (max-width:480px){

    body{
        padding:15px;
    }

    .card{
        padding:18px;
    }

    h1{
        font-size:24px;
    }

    p{
        font-size:15px;
    }

    .button{
        font-size:15px;
        padding:12px;
    }
}
</style>

</head>

<body>

<div class="card">

    <img src="images/hotel.jpeg" alt="Hotel STM Palace" class="hotel-image">

    <h1>Hotel STM Palace</h1>

    <p>
        <strong>Address</strong><br>
        Thadagam Road,<br>
        Near Paal Company,<br>
        RS Puram,<br>
        Coimbatore - 641002
    </p>

    <p>
        <strong>Phone</strong><br><br>
        <a href="tel:+914224959501">0422 4959501</a><br>
        <a href="tel:+919943322003">+91 99433 22003</a><br>
        <a href="tel:+918350006000">+91 83500 06000</a>
    </p>

    <a class="button"
       href="https://www.google.com/maps/place/11%C2%B000'27.2%22N+76%C2%B056'42.6%22E/@11.0075539,76.9425883,17z/data=!3m1!4b1!4m4!3m3!8m2!3d11.0075539!4d76.9451632?hl=en&entry=ttu&g_ep=EgoyMDI2MDcwOC4wIKXMDSoASAFQAw%3D%3D"
       target="_blank">
       📍 Open in Google Maps
    </a>

</div>

</body>
</html>
